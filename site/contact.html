<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – StatDoctor</title>
<meta name="description" content="Get in touch with StatDoctor. Whether you're a hospital, doctor, investor, or partner — we'd love to hear from you.">
<link rel="icon" href="https://cdn.prod.website-files.com/688db6d677516719c3925d01/6890a03498323d7b7c29d34e_statdoc_logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/contact.css">
</head>
<body>

<header id="site-nav"></header>

<section class="contact-hero">
  <div class="container">
    <h1 class="reveal-scroll">Get in <em>Touch</em></h1>
    <p class="subtitle reveal-scroll">Whether you're a hospital, doctor, investor, or partner — we'd love to hear from you.</p>

    <div class="contact-grid">
      <!-- Left column: Form -->
      <div class="contact-form-card reveal-scroll">
        <form onsubmit="event.preventDefault(); alert('Thanks! We\u2019ll be in touch soon.');">
          <div class="form-group">
            <label for="contact-role">I am a...</label>
            <select id="contact-role" class="select" required>
              <option value="" disabled selected>Select one</option>
              <option value="hospital">Hospital</option>
              <option value="doctor">Doctor</option>
              <option value="investor">Potential Investor</option>
              <option value="partner">Partner</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="contact-name">Full Name</label>
              <input type="text" id="contact-name" class="input" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label for="contact-email">Email</label>
              <input type="email" id="contact-email" class="input" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="contact-phone">Phone</label>
            <input type="tel" id="contact-phone" class="input" placeholder="+61 400 000 000">
          </div>

          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" class="textarea" placeholder="Tell us how we can help..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>

      <!-- Right column: Info + Social -->
      <div>
        <div class="contact-info-card reveal-scroll">
          <h3>Contact Information</h3>
          <div class="contact-info-item">
            <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
            <a href="tel:+61450828219">+61 450 828 219</a>
          </div>
          <div class="contact-info-item">
            <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            <a href="mailto:anu@statdoctor.app">anu@statdoctor.app</a>
          </div>
        </div>

        <div class="contact-social-card reveal-scroll">
          <h3>Follow us</h3>
          <div class="social-links">
            <a href="https://www.linkedin.com/company/statdoctor/" target="_blank" rel="noopener noreferrer" class="social-circle" aria-label="LinkedIn">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <a href="https://www.facebook.com/statdoctorau" target="_blank" rel="noopener noreferrer" class="social-circle" aria-label="Facebook">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

            </a>
            <a href="https://www.youtube.com/@statdoctor" target="_blank" rel="noopener noreferrer" class="social-circle" aria-label="YouTube">

            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/nav.js"></script>
</body>
</html>
