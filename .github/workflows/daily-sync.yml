name: Daily CRM Sync

on:
  schedule:
    # 08:00 AEST (AEDT = UTC+10/+11, so 21:00 UTC previous day in standard time,
    # 22:00 UTC in daylight savings). We use 21:00 UTC which is 08:00 AEDT in summer
    # and 07:00 AEST in winter — close enough to "8am Australia".
    - cron: "0 21 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: direct-shift-connect
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sync deps only
        run: npm install --no-save --no-audit --legacy-peer-deps @supabase/supabase-js@^2

      - name: Run daily sync
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_PORTAL_TOKEN: ${{ secrets.ADMIN_PORTAL_TOKEN }}
        run: node scripts/daily-sync.mjs
